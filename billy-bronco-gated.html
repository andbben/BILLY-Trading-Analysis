<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billy Bronco Market Analyst</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080f1c;--bg2:#0d1729;--bg3:#111f35;--border:rgba(255,255,255,0.06);--blue:#00d4ff;--cyan:#00ffea;--green:#00e676;--red:#ff3d71;--amber:#ffb700;--purple:#7c5cfc;--t1:#ffffff;--t2:#7a90b0;--t3:#3d5270;--r:14px;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Archivo',sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden;min-height:100vh;}
button{font-family:'Archivo',sans-serif;cursor:pointer;}
input,select,textarea{font-family:'Archivo',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--t3);border-radius:3px;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:62px;background:rgba(8,15,28,0.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 18px;z-index:900;}
.nav-logo{display:flex;align-items:center;gap:9px;font-weight:900;font-size:1.1rem;letter-spacing:-.02em;cursor:pointer;flex-shrink:0;}
.nav-logo-box{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem;color:var(--bg);}
.nav-links{display:flex;gap:3px;}
.nav-btn{background:none;border:none;color:var(--t2);font-size:.85rem;font-weight:600;padding:6px 12px;border-radius:8px;transition:all .2s;white-space:nowrap;}
.nav-btn:hover{color:var(--t1);background:rgba(255,255,255,.05);}
.nav-btn.active{color:var(--blue);background:rgba(0,212,255,.1);}
.nav-search{flex:1;max-width:280px;position:relative;}
.nav-search input{width:100%;padding:7px 12px 7px 32px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-size:.83rem;transition:all .2s;}
.nav-search input:focus{outline:none;border-color:var(--blue);background:var(--bg2);}
.nav-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.85rem;pointer-events:none;}
.search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:1000;box-shadow:0 12px 40px rgba(0,0,0,.5);}
.search-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s;}
.search-item:hover{background:rgba(0,212,255,.06);}
.search-ticker-box{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.7rem;flex-shrink:0;}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.mkt-status{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:20px;}
.mkt-open{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.25);}
.mkt-closed{background:rgba(255,255,255,.05);color:var(--t3);border:1px solid var(--border);}
.mkt-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite;}
.update-time{font-size:.7rem;color:var(--t3);display:flex;align-items:center;gap:4px;}
.api-banner{background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(0,212,255,.1));border-bottom:1px solid rgba(124,92,252,.3);padding:8px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:.8rem;}
.api-banner-text{color:var(--t2);}
.api-banner-text strong{color:var(--purple);}

/* LAYOUT */
.layout{display:flex;padding-top:96px;min-height:100vh;}
.sidebar{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:16px 10px;position:sticky;top:96px;height:calc(100vh - 96px);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-section{margin-bottom:22px;}
.sidebar-label{font-size:.66rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:0 8px;margin-bottom:6px;}
.side-btn{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:var(--t2);font-size:.86rem;font-weight:500;padding:9px 10px;border-radius:10px;transition:all .2s;text-align:left;}
.side-btn:hover{color:var(--t1);background:rgba(255,255,255,.05);}
.side-btn.active{color:var(--blue);background:rgba(0,212,255,.1);}
.side-btn .icon{font-size:.95rem;width:18px;text-align:center;}
.side-badge{margin-left:auto;background:rgba(0,212,255,.15);color:var(--blue);font-size:.65rem;font-weight:800;padding:2px 7px;border-radius:10px;}
.sidebar-grow{flex:1;}
.sidebar-auth{border-top:1px solid var(--border);padding-top:12px;margin-top:6px;}
.auth-user{display:flex;align-items:center;gap:9px;padding:4px 8px 10px;}
.auth-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem;color:var(--bg);flex-shrink:0;}
.auth-name{font-size:.83rem;font-weight:700;line-height:1.2;}
.auth-email{font-size:.7rem;color:var(--t3);}
.plan-pill{display:inline-block;margin-top:3px;padding:1px 7px;border-radius:10px;font-size:.62rem;font-weight:800;text-transform:uppercase;}
.plan-free{background:rgba(255,255,255,.08);color:var(--t3);}
.plan-pro{background:linear-gradient(135deg,rgba(124,92,252,.3),rgba(0,212,255,.2));color:var(--blue);}
.plan-premium{background:rgba(255,183,0,.15);color:var(--amber);}
.btn-signin{width:100%;background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;color:var(--bg);font-weight:800;font-size:.86rem;padding:10px;border-radius:10px;transition:all .2s;}
.btn-signin:hover{opacity:.9;transform:translateY(-1px);}
.btn-signout{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--t2);font-weight:600;font-size:.8rem;padding:8px;border-radius:10px;transition:all .2s;}
.btn-signout:hover{background:rgba(255,61,113,.1);border-color:rgba(255,61,113,.3);color:var(--red);}

/* MAIN */
.main{flex:1;padding:24px;overflow-y:auto;max-width:1380px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:1.7rem;font-weight:800;letter-spacing:-.03em;}
.page-sub{font-size:.83rem;color:var(--t2);margin-top:3px;}

/* BUTTONS */
.btn{border:none;border-radius:10px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--cyan));color:var(--bg);padding:9px 18px;font-size:.86rem;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,212,255,.35);}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--t1);border:1px solid var(--border);padding:8px 16px;font-size:.84rem;}
.btn-ghost:hover{background:rgba(255,255,255,.1);}
.btn-danger{background:rgba(255,61,113,.12);color:var(--red);border:1px solid rgba(255,61,113,.25);padding:5px 11px;font-size:.78rem;}
.btn-danger:hover{background:rgba(255,61,113,.22);}
.btn-sm{padding:5px 11px;font-size:.76rem;}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;padding:9px 18px;font-size:.86rem;}
.btn-purple:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,92,252,.4);}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:border .25s;}
.card:hover{border-color:rgba(0,212,255,.18);}
.card-grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:18px;}
.card-grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px;margin-bottom:18px;}
.card-grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:18px;}
.stat-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:6px;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.75rem;font-weight:700;letter-spacing:-.02em;margin-bottom:5px;}
.stat-change{font-size:.83rem;font-weight:600;display:flex;align-items:center;gap:4px;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.neu{color:var(--t2);}

/* SPARKLINE & CHART */
.sparkline{width:100%;height:44px;margin-top:10px;}
.chart-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:18px;}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.chart-title{font-size:.95rem;font-weight:700;}
.chart-tabs{display:flex;gap:3px;}
.chart-tab{background:none;border:none;color:var(--t3);font-size:.78rem;font-weight:600;padding:5px 9px;border-radius:6px;transition:all .2s;}
.chart-tab.active{background:rgba(0,212,255,.15);color:var(--blue);}
.chart-tab:hover:not(.active){color:var(--t1);}

/* AI / SIGNAL PANEL */
.ai-panel{background:linear-gradient(135deg,rgba(0,212,255,.07),rgba(0,255,234,.04));border:1px solid rgba(0,212,255,.18);border-radius:var(--r);padding:18px;margin-bottom:18px;}
.ai-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.ai-icon-box{width:40px;height:40px;background:linear-gradient(135deg,var(--blue),var(--cyan));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.ai-title{font-size:1.05rem;font-weight:800;}
.ai-live{padding:3px 9px;background:rgba(0,230,118,.15);border-radius:20px;font-size:.68rem;font-weight:700;color:var(--green);animation:pulse 2s infinite;}
.ai-explain{font-size:.7rem;color:var(--t3);margin-left:auto;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}
.insight-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.insight-card{background:rgba(8,15,28,.5);border-radius:10px;padding:13px;border-left:3px solid var(--blue);}
.insight-card.warn{border-left-color:var(--amber);}
.insight-card.bull{border-left-color:var(--green);}
.insight-card.bear{border-left-color:var(--red);}
.insight-ticker{font-weight:800;font-size:.76rem;color:var(--blue);margin-bottom:4px;font-family:'JetBrains Mono',monospace;}
.insight-card.warn .insight-ticker{color:var(--amber);}
.insight-card.bull .insight-ticker{color:var(--green);}
.insight-card.bear .insight-ticker{color:var(--red);}
.insight-text{font-size:.8rem;color:var(--t2);line-height:1.5;}
.insight-factors{font-size:.7rem;color:var(--t3);margin-top:5px;line-height:1.5;}
.confidence{display:flex;align-items:center;gap:6px;margin-top:7px;font-size:.7rem;color:var(--t3);}
.conf-bar{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.conf-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));}

/* TOP MOVERS */
.movers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.movers-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.movers-head{padding:10px 16px;border-bottom:1px solid var(--border);font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.movers-head.up{color:var(--green);}
.movers-head.dn{color:var(--red);}
.mover-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.025);transition:background .15s;}
.mover-row:last-child{border-bottom:none;}
.mover-row:hover{background:rgba(255,255,255,.02);}
.mover-sym{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.87rem;}
.mover-name{font-size:.72rem;color:var(--t3);}
.mover-chg{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.87rem;}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px;}
.table-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 80px;padding:11px 18px;border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);}
.table-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 80px;padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s;cursor:pointer;align-items:center;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:rgba(0,212,255,.04);}
.ticker-cell{display:flex;align-items:center;gap:10px;}
.ticker-logo{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;flex-shrink:0;}
.ticker-name{font-weight:700;font-size:.88rem;font-family:'JetBrains Mono',monospace;}
.ticker-full{font-size:.72rem;color:var(--t3);margin-top:1px;}
.mono{font-family:'JetBrains Mono',monospace;font-weight:600;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:700;}
.badge-buy{background:rgba(0,230,118,.15);color:var(--green);}
.badge-hold{background:rgba(255,183,0,.15);color:var(--amber);}
.badge-sell{background:rgba(255,61,113,.15);color:var(--red);}

/* ALERTS */
.alert-item{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s;gap:10px;flex-wrap:wrap;}
.alert-item:last-child{border-bottom:none;}
.alert-item:hover{background:rgba(255,255,255,.02);}
.alert-left{display:flex;align-items:center;gap:10px;}
.alert-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.alert-dot.active{background:var(--green);box-shadow:0 0 7px rgba(0,230,118,.5);}
.alert-dot.triggered{background:var(--amber);box-shadow:0 0 7px rgba(255,183,0,.4);animation:pulse 1.5s infinite;}
.alert-dot.inactive{background:var(--t3);}
.alert-info .alert-name{font-weight:700;font-size:.88rem;margin-bottom:2px;}
.alert-info .alert-desc{font-size:.76rem;color:var(--t2);}
.alert-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.status-pill{padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700;}
.status-active{background:rgba(0,230,118,.12);color:var(--green);}
.status-triggered{background:rgba(255,183,0,.12);color:var(--amber);}
.status-inactive{background:rgba(255,255,255,.05);color:var(--t3);}

/* NEWS */
.news-item{padding:15px 18px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .15s;}
.news-item:hover{background:rgba(255,255,255,.02);}
.news-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.news-source{font-size:.7rem;font-weight:700;color:var(--blue);}
.news-time{font-size:.7rem;color:var(--t3);}
.news-title{font-size:.88rem;font-weight:600;line-height:1.45;margin-bottom:6px;}
.news-tickers{display:flex;gap:4px;flex-wrap:wrap;}
.news-tag{padding:2px 7px;background:rgba(0,212,255,.08);border-radius:4px;font-size:.68rem;font-weight:700;color:var(--blue);font-family:'JetBrains Mono',monospace;}
.sent-score{display:flex;align-items:center;gap:4px;font-size:.7rem;font-weight:700;}
.sent-bull{color:var(--green);}
.sent-bear{color:var(--red);}
.sent-neu{color:var(--amber);}

/* PORTFOLIO */
.port-alloc{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:10px 0;}
.port-bar{height:100%;transition:width .6s ease;}
.port-legend{display:flex;flex-wrap:wrap;gap:9px;margin-top:7px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.73rem;color:var(--t2);}
.leg-dot{width:8px;height:8px;border-radius:50%;}
.risk-section{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.risk-gauge-wrap{display:flex;flex-direction:column;align-items:center;}
.risk-factors{flex:1;min-width:160px;}
.risk-factor-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:.78rem;}
.risk-factor-row:last-child{border-bottom:none;}
.risk-rec{margin-top:12px;padding:12px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);border-radius:10px;font-size:.82rem;color:var(--t2);line-height:1.6;}

/* TECH INDICATORS */
.indicator-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:14px 0;}
.indicator-box{background:var(--bg3);border-radius:10px;padding:12px;text-align:center;}
.ind-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:5px;}
.ind-val{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;margin-bottom:4px;}
.ind-sub{font-size:.7rem;color:var(--t2);}
.rsi-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:8px;position:relative;}
.rsi-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.rsi-zones{display:flex;justify-content:space-between;font-size:.6rem;color:var(--t3);margin-top:2px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:14px;animation:fadein .2s;}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--bg2);border:1px solid rgba(0,212,255,.2);border-radius:18px;padding:26px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;animation:scalein .2s;}
@keyframes scalein{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:scale(1);}}
.modal-wide{max-width:680px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:1.25rem;font-weight:800;}
.close-btn{background:rgba(255,255,255,.07);border:none;color:var(--t1);width:30px;height:30px;border-radius:8px;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.close-btn:hover{background:rgba(255,255,255,.14);}
.form-group{margin-bottom:15px;}
.form-label{display:block;font-size:.8rem;font-weight:600;color:var(--t2);margin-bottom:5px;}
.form-input,.form-select{width:100%;padding:9px 13px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-size:.88rem;transition:border .2s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--blue);}
.form-hint{font-size:.74rem;color:var(--t3);margin-top:4px;line-height:1.5;}
.form-hint a{color:var(--blue);}

/* AUTH */
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px;}
.auth-tab{flex:1;background:none;border:none;color:var(--t2);font-weight:700;font-size:.88rem;padding:8px;border-radius:8px;transition:all .2s;}
.auth-tab.active{background:var(--bg2);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.4);}
.auth-divider{display:flex;align-items:center;gap:10px;margin:15px 0;color:var(--t3);font-size:.76rem;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* SUBSCRIPTION */
.plan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;margin-top:24px;}
.plan-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:24px;transition:all .25s;position:relative;overflow:hidden;}
.plan-card.featured{border-color:var(--blue);box-shadow:0 0 40px rgba(0,212,255,.1);}
.plan-card.current{border-color:var(--green);}
.plan-badge{position:absolute;top:14px;right:14px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:800;text-transform:uppercase;}
.plan-most-popular{background:linear-gradient(135deg,var(--blue),var(--cyan));color:var(--bg);}

// Keyed by ticker → { articles: [], ts: epoch }
const STOCK_NEWS_CACHE = {};
const STOCK_NEWS_TTL = 5 * 60 * 1000; // 5 min

async function fetchStockNews(ticker, globalNews) {
  // Check cache
  const cached = STOCK_NEWS_CACHE[ticker];
  if (cached && Date.now() - cached.ts < STOCK_NEWS_TTL) return cached.articles;

  try {
    // Try Finnhub company news (last 7 days)
    const to = Math.floor(Date.now() / 1000);
    const from = to - 7 * 86400;
    const today = new Date().toISOString().split('T')[0];
    const fromDate = new Date((from) * 1000).toISOString().split('T')[0];
    const r = await fetch(`${FH_BASE}/company-news?symbol=${ticker}&from=${fromDate}&to=${today}&token=${FH_KEY}`);
    if (r.ok) {
      const d = await r.json();
      if (Array.isArray(d) && d.length > 0) {
        const articles = d.slice(0, 8).map(n => ({ ...n, headline: n.headline || n.title, related: ticker }));
        STOCK_NEWS_CACHE[ticker] = { articles, ts: Date.now() };
        return articles;
      }
    }
  } catch(e) {}

  // Fallback: filter from global demo news
  const fallback = globalNews.filter(n => (n.related || '').toUpperCase().includes(ticker));
  // Add generic stock articles if we don't have enough
  const info = STOCKS_BASE[ticker];
  const synthetic = [
    { id: `syn-${ticker}-1`, source: 'Finnhub News', headline: `${info?.name || ticker} latest market update — analyst coverage and price targets`, summary: `Analysts continue to monitor ${ticker} closely as the stock trades near key technical levels. Institutional flow data shows mixed signals ahead of the next earnings report. Multiple investment banks have updated price targets.`, datetime: Date.now()/1000 - 3600, related: ticker, url: null },
    { id: `syn-${ticker}-2`, source: 'Market Pulse', headline: `${ticker} sector trends: ${info?.sector || 'Market'} outlook for the coming quarter`, summary: `The ${info?.sector || 'broader market'} sector faces shifting macro conditions including Fed policy expectations and geopolitical risk. ${ticker} is positioned relative to peers based on recent earnings guidance and valuation multiples.`, datetime: Date.now()/1000 - 86400, related: ticker, url: null },
  ];
  const merged = [...fallback, ...synthetic].slice(0, 6);
  STOCK_NEWS_CACHE[ticker] = { articles: merged, ts: Date.now() };
  return merged;
}

// ─── UTILITIES ────────────────────────────────────────────────────────────────
const fmt = (n, d=2) => n == null ? '—' : Number(n).toLocaleString('en-US', {minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct = (n) => n == null ? '—' : `${n>=0?'+':''}${fmt(n)}%`;
const fmtPrice = (n) => n == null ? '—' : `$${fmt(n)}`;
const timeAgo = (ts) => { const s=Date.now()/1000-ts; if(s<60)return`${Math.floor(s)}s ago`; if(s<3600)return`${Math.floor(s/60)}m ago`; if(s<86400)return`${Math.floor(s/3600)}h ago`; return`${Math.floor(s/86400)}d ago`; };

function calcEMA(data, period) {
  if (!data || data.length < period) return [];
  const k = 2 / (period + 1);
  let ema = data.slice(0, period).reduce((a,b)=>a+b,0)/period;
  const out = [ema];
  for (let i = period; i < data.length; i++) { ema = data[i]*k + ema*(1-k); out.push(ema); }
  return out;
}
function calcRSI(closes, period=14) {
  if (!closes || closes.length < period+1) return null;
  let gains=0, losses=0;
  for (let i=1;i<=period;i++) { const d=closes[i]-closes[i-1]; d>0?gains+=d:losses-=d; }
  let avgG=gains/period, avgL=losses/period;
  for (let i=period+1;i<closes.length;i++) {
    const d=closes[i]-closes[i-1];
    avgG=(avgG*(period-1)+Math.max(0,d))/period;
    avgL=(avgL*(period-1)+Math.max(0,-d))/period;
  }
  if (avgL===0) return 100;
  return 100-100/(1+avgG/avgL);
}
function calcMACD(closes) {
  if (!closes || closes.length < 35) return null;
  const ema12=calcEMA(closes,12), ema26=calcEMA(closes,26);
  const offset=12-1;
  const macdLine=ema26.map((_,i)=>ema12[i+offset]-ema26[i]);
  const signal=calcEMA(macdLine,9);
  const last=macdLine[macdLine.length-1], lastSig=signal[signal.length-1];
  return { macd:last, signal:lastSig, histogram:last-lastSig };
}
function calcSMA(closes, period) {
  if (!closes || closes.length < period) return null;
  return closes.slice(-period).reduce((a,b)=>a+b,0)/period;
}

function classifySentiment(headline='', summary='') {
  const text=(headline+' '+summary).toLowerCase();
  const bull=['surge','jump','rally','gain','beat','record','growth','profit','rise','boost','strong','positive','bullish','upgrade','soar','accelerate'];
  const bear=['fall','drop','decline','miss','loss','down','weak','negative','bearish','cut','crash','fear','concern','risk','disappoint','fall','slump'];
  const bs=bull.filter(w=>text.includes(w)).length;
  const rs=bear.filter(w=>text.includes(w)).length;
  if (bs>rs+1) return {sentiment:'bull',score:Math.min(9.5,5.5+bs*.5)};
  if (rs>bs+1) return {sentiment:'bear',score:Math.max(1.5,4.5-rs*.5)};
  return {sentiment:'neu',score:5+(bs-rs)*.3};
}

function generateSignal(closes, curPrice, prevClose) {
  if (!closes || closes.length < 30) {
    const dp = prevClose ? (curPrice-prevClose)/prevClose*100 : 0;
    if (dp > 2) return { signal:'BUY', type:'bull', conf:68, factors:['Strong intraday momentum','Price above prior close'] };
    if (dp < -2) return { signal:'SELL', type:'bear', conf:65, factors:['Bearish intraday move','Price below prior close'] };
    return { signal:'HOLD', type:'warn', conf:58, factors:['Neutral price action','Awaiting directional catalyst'] };
  }
  const rsi=calcRSI(closes), macd=calcMACD(closes);
  const sma20=calcSMA(closes,20), sma50=calcSMA(closes,50);
  let score=0; const factors=[];
  if (rsi!=null){
    if(rsi<30){score+=2;factors.push(`RSI oversold (${fmt(rsi,1)})`);}
    else if(rsi<40){score+=1;factors.push(`RSI approaching oversold (${fmt(rsi,1)})`);}
    else if(rsi>70){score-=2;factors.push(`RSI overbought (${fmt(rsi,1)})`);}
    else if(rsi>60){score-=1;factors.push(`RSI elevated (${fmt(rsi,1)})`);}
    else factors.push(`RSI neutral (${fmt(rsi,1)})`);
  }
  if (macd!=null){
    if(macd.histogram>0&&macd.macd>0){score+=1;factors.push('MACD bullish crossover');}
    else if(macd.histogram<0&&macd.macd<0){score-=1;factors.push('MACD bearish crossover');}
    else factors.push('MACD mixed');
  }
  if (sma20&&sma50){
    if(curPrice>sma50){score+=1;factors.push(`Above 50-day MA ($${fmt(sma50)})`);}
    else{score-=1;factors.push(`Below 50-day MA ($${fmt(sma50)})`);}
    if(sma20>sma50){score+=1;factors.push('Golden cross (20MA > 50MA)');}
    else{score-=1;factors.push('Death cross (20MA < 50MA)');}
  }
  const conf=Math.min(91,Math.max(50,60+Math.abs(score)*7));
  if(score>=2) return {signal:'BUY',type:'bull',conf,rsi,macd,sma20,sma50,factors};
  if(score<=-2) return {signal:'SELL',type:'bear',conf,rsi,macd,sma20,sma50,factors};
  return {signal:'HOLD',type:'warn',conf,rsi,macd,sma20,sma50,factors};
}

function computeRiskScore(rows) {
  const totalVal=rows.reduce((s,r)=>s+r.val,0);
  if(!totalVal) return 50;
  const maxW=Math.max(...rows.map(r=>r.val/totalVal));
  const sectors=[...new Set(rows.map(r=>STOCKS_BASE[r.ticker]?.sector).filter(Boolean))];
  const wBeta=rows.reduce((s,r)=>s+(STOCKS_BASE[r.ticker]?.beta||1.2)*(r.val/totalVal),0);
  let score=0;
  score+=wBeta*22;
  score+=maxW*28;
  score+=Math.max(0,(4-sectors.length)*6);
  if(rows.length<3) score+=10;
  return Math.round(Math.min(100,Math.max(5,score)));
}

//   • On load: fetch all quotes via REST (one call per symbol, staggered 350 ms).
//   • WebSocket: subscribe to all stocks for real-time trade ticks (market hours).
//   • Auto REST re-poll: every 15 s (market open) or 90 s (market closed).
//   • Candles: fetched on demand, cached in sessionStorage for 24 h.
//   • News: fetched once, refreshed every 5 min.
// Rate budget (free 60 req/min): 13 symbols × REST poll = 13 calls/poll.
//   At 15 s intervals → 52 calls/min max, safely under the limit.

const FH_KEY  = 'd79jethr01qqpmhh033g';
const FH_BASE = 'https://finnhub.io/api/v1';

// ── Fallback closing prices (used when API is unavailable / market loading) ─
// Values are approximate recent closes — display only, not financial advice.
const FALLBACK_PRICES = {
  AAPL:193.18, NVDA:876.35, MSFT:415.50, TSLA:247.80, AMZN:193.25,
  GOOGL:168.10, META:499.05, JPM:200.15, AMD:158.40, NFLX:616.20,
  SPY:524.60, QQQ:441.50, DIA:389.20,
};
function makeFallbackQuote(sym) {
  const c = FALLBACK_PRICES[sym] || 100;
  return { c, pc: c * 0.998, d: c * 0.002, dp: 0.2, h: c * 1.005, l: c * 0.995, o: c * 0.999, t: 0, isFallback: true };
}

// ── sessionStorage cache for candles only (quotes are always live) ────────
const CANDLE_TTL = 24 * 60 * 60 * 1000;
function cGet(k) {
  try {
    const raw = sessionStorage.getItem('bbfh_' + k);
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    if (Date.now() - ts > CANDLE_TTL) { sessionStorage.removeItem('bbfh_' + k); return null; }
    return data;
  } catch(e) { return null; }
}
function cSet(k, data) {
  try { sessionStorage.setItem('bbfh_' + k, JSON.stringify({ data, ts: Date.now() })); } catch(e) {}
}

const ALL_FETCH_SYMS = [...Object.keys(STOCKS_BASE), 'SPY', 'QQQ', 'DIA'];

// ── Derive local market status from clock (US/Eastern) ───────────────────
function localMktStatus() {
  const et   = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const day  = et.getDay(), mins = et.getHours() * 60 + et.getMinutes();
  const isOpen = day >= 1 && day <= 5 && mins >= 570 && mins < 960; // 9:30–16:00 ET
  return { isOpen, session: isOpen ? 'regular' : 'closed', exchange: 'US' };
}

// ── Main data hook ────────────────────────────────────────────────────────
function useMarketData() {
  const [quotes,     setQuotes]     = useState({});
  const [news,       setNews]       = useState(DEMO_NEWS);
  const [mktStatus,  setMktStatus]  = useState(localMktStatus());
  const [loading,    setLoading]    = useState(true);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [error,      setError]      = useState(null);
  const [wsStatus,   setWsStatus]   = useState('connecting'); // 'live'|'polling'|'error'

  const wsRef      = useRef(null);
  const pollRef    = useRef(null);
  const newsRef    = useRef(null);
  const mountedRef = useRef(true);

  // ── Fetch a single quote from Finnhub REST ────────────────────────────
  const fetchQuote = useCallback(async (symbol) => {
    try {
      const r = await fetch(`${FH_BASE}/quote?symbol=${symbol}&token=${FH_KEY}`);
      if (!r.ok) return null;
      const d = await r.json();
      // Finnhub returns {c,d,dp,h,l,o,pc,t} — exactly our internal shape
      // Log first response so devs can see what's coming back (open F12 console)
      if (symbol === 'AAPL') {
        console.log('[Billy Bronco] Finnhub AAPL raw response:', JSON.stringify(d));
        if (!d || typeof d.c !== 'number' || d.c <= 0)
          console.warn('[Billy Bronco] Quote rejected — key may be wrong. Response:', JSON.stringify(d));
      }
      // Reject API error objects, non-numeric, or genuinely missing data
      if (!d || typeof d.c !== 'number' || d.c <= 0) return null;
      return d;
    } catch(e) { console.error('[Billy Bronco] fetch error:', e); return null; }
  }, []);

  // ── Fetch all quotes, staggered to respect 60 req/min ─────────────────
  const refreshAllQuotes = useCallback(async () => {
    let anySuccess = false;
    const status = localMktStatus();
    if (mountedRef.current) setMktStatus(status);

    for (let i = 0; i < ALL_FETCH_SYMS.length; i++) {
      const sym = ALL_FETCH_SYMS[i];
      const q   = await fetchQuote(sym);
      if (q && mountedRef.current) {
        setQuotes(prev => ({ ...prev, [sym]: q }));
        anySuccess = true;
      } else if (mountedRef.current) {
        // Fetch failed — keep existing quotes map intact (fallbacks already seeded on boot)
        // Do NOT call setQuotes here; returning prev[sym] instead of prev was destroying the map.
      }
      // 350 ms gap → ~2.8 syms/s → 13 syms in ~4.5 s, safe for 60 req/min
      if (i < ALL_FETCH_SYMS.length - 1) await new Promise(r => setTimeout(r, 350));
    }
    if (mountedRef.current) {
      setLastUpdate(new Date());
      setLoading(false);
      if (!anySuccess) {
        setError('Showing estimated prices — live quotes pending. Check browser console (F12) for details.');
      } else {
        setError(null);
        // Clear isFallback flags now that we have real data
      }
    }
  }, [fetchQuote]);

  // ── WebSocket for real-time trade ticks (market hours) ───────────────
  const openWS = useCallback(() => {
    if (wsRef.current && wsRef.current.readyState <= 1) return; // already open/connecting
    const ws = new WebSocket(`wss://ws.finnhub.io?token=${FH_KEY}`);
    wsRef.current = ws;

    ws.onopen = () => {
      setWsStatus('live');
      // Subscribe to every stock (indices are not streamable via WS on free tier)
      Object.keys(STOCKS_BASE).forEach(sym => {
        ws.send(JSON.stringify({ type: 'subscribe', symbol: sym }));
      });
    };

    ws.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type !== 'trade' || !Array.isArray(msg.data)) return;
        // Group by symbol, take the last (most recent) trade per symbol
        const bySymbol = {};
        msg.data.forEach(trade => { bySymbol[trade.s] = trade.p; });
        setQuotes(prev => {
          const next = { ...prev };
          Object.entries(bySymbol).forEach(([sym, price]) => {
            if (!next[sym]) return;
            const pc = next[sym].pc || next[sym].c;
            const dv = price - pc;
            const dp = pc ? (dv / pc) * 100 : 0;
            next[sym] = { ...next[sym], c: price, d: dv, dp, t: Date.now() / 1000 };
          });
          return next;
        });
        setLastUpdate(new Date());
      } catch(e) {}
    };

    ws.onerror = () => { setWsStatus('polling'); };
    ws.onclose = () => {
      // Re-open after 10 s if market still open
      setTimeout(() => {
        if (mountedRef.current && localMktStatus().isOpen) openWS();
      }, 10000);
    };
  }, []);

  const closeWS = useCallback(() => {
    if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
  }, []);

  // ── Start / stop polling interval ─────────────────────────────────────
  const startPolling = useCallback((intervalMs) => {
    if (pollRef.current) clearInterval(pollRef.current);
    pollRef.current = setInterval(refreshAllQuotes, intervalMs);
  }, [refreshAllQuotes]);

  // ── Fetch news ────────────────────────────────────────────────────────
  const fetchNews = useCallback(async () => {
    try {
      const r = await fetch(`${FH_BASE}/news?category=general&token=${FH_KEY}`);
      if (!r.ok) return;
      const d = await r.json();
      if (Array.isArray(d) && d.length > 0 && mountedRef.current) setNews(d.slice(0, 25));
    } catch(e) {}
  }, []);

  // ── Candle fetch — on demand, 24 h cached ────────────────────────────
  const fetchStockCandles = useCallback(async (symbol, tf = '1Y') => {
    const ckey = symbol + '_' + tf;
    const hit  = cGet(ckey);
    if (hit) return hit;

    const dayMap = { '1W': 7, '1M': 30, '3M': 90, '6M': 180, '1Y': 365 };
    const days   = dayMap[tf] || 365;
    const to     = Math.floor(Date.now() / 1000);
    const from   = to - days * 86400;
    // Always use Daily resolution — consistent with industry standard
    // (intraday hourly bars for 1W gave inconsistent data, daily is cleaner)
    const res    = 'D';

    // Helper to always return synthetic data as fallback
    const makeSynthetic = () => {
      const endPrice = FALLBACK_PRICES[symbol] || 100;
      const synth = genSyntheticCandles(symbol, endPrice, days);
      return { c: synth, s: 'synthetic' };
    };

    try {
      const r = await fetch(`${FH_BASE}/stock/candle?symbol=${symbol}&resolution=${res}&from=${from}&to=${to}&token=${FH_KEY}`);
      if (!r.ok) return makeSynthetic();
      const d = await r.json();
      if (d?.s === 'ok' && Array.isArray(d.c) && d.c.length > 1) {
        cSet(ckey, d);
        return d;
      }
      // API returned 'no_data' or empty — use synthetic so chart always renders
      return makeSynthetic();
    } catch(e) {
      return makeSynthetic();
    }
  }, []);

  // ── Boot sequence ─────────────────────────────────────────────────────
  useEffect(() => {
    mountedRef.current = true;
    const status = localMktStatus();

    // 0. Pre-populate with fallbacks so table never shows all dashes
    const initQ = {};
    ALL_FETCH_SYMS.forEach(sym => { initQ[sym] = makeFallbackQuote(sym); });
    setQuotes(initQ);
    setLoading(false);

        // 1. Initial quote fetch (all symbols)
    refreshAllQuotes();

    // 2. WebSocket for real-time ticks when market is open
    if (status.isOpen) {
      openWS();
      setWsStatus('live');
    } else {
      setWsStatus('polling');
    }

    // 3. Auto-poll: 15 s when open, 90 s when closed
    startPolling(status.isOpen ? 15000 : 90000);

    // 4. Re-evaluate market open/closed every minute and adjust
    const clockTick = setInterval(() => {
      const s = localMktStatus();
      if (mountedRef.current) setMktStatus(s);
      // Transition: closed → open
      if (s.isOpen && wsRef.current?.readyState > 1) { openWS(); startPolling(15000); }
      // Transition: open → closed
      if (!s.isOpen && wsRef.current?.readyState <= 1) { closeWS(); startPolling(90000); setWsStatus('polling'); }
    }, 60000);

    // 5. News: fetch now + every 5 min
    fetchNews();
    newsRef.current = setInterval(fetchNews, 300000);

    return () => {
      mountedRef.current = false;
      clearInterval(pollRef.current);
      clearInterval(clockTick);
      clearInterval(newsRef.current);
      closeWS();
    };
  }, []);

  return { quotes, news, mktStatus, loading, lastUpdate, error, wsStatus, fetchStockCandles };
}

// ─── SYNTHETIC CANDLE GENERATOR (fallback when API unavailable) ─────────────
// Deterministic seeded random walk — same ticker+tf always gives same chart shape.
function genSyntheticCandles(ticker, endPrice, days) {
  let seed = ticker.split('').reduce((a,c,i)=>a + c.charCodeAt(0) * (i+1), 7);
  const lcg = () => { seed = (seed * 1664525 + 1013904223) & 0x7fffffff; return seed / 0x7fffffff; };
  const prices = [];
  // Start at a varied offset from end price
  let p = endPrice * (0.78 + lcg() * 0.30);
  for (let i = 0; i < days - 1; i++) {
    const progress = i / (days - 1);
    const pull = (endPrice - p) / endPrice * 0.08; // mean-revert toward end
    const noise = (lcg() - 0.499) * 0.022;
    p = Math.max(endPrice * 0.3, p * (1 + pull + noise));
    prices.push(p);
  }
  prices.push(endPrice); // always end exactly at current price
  return prices;
}

// ─── SVG COMPONENTS ──────────────────────────────────────────────────────────
function Sparkline({data,color,height=44}){
  if(!data||data.length<2) return <div style={{height}} />;
  const w=200,h=height,min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/range)*h*.82-h*.09}`).join(' ');
  const gid=`sg${color.replace(/[^a-z0-9]/gi,'')}`;
  return(
    <svg viewBox={`0 0 ${w} ${h}`} className="sparkline" preserveAspectRatio="none">
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={`${pts} ${w},${h} 0,${h}`} fill={`url(#${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}

// LiveSparkline: fetches real 30-day candle data for a ticker and renders it.
// Falls back to the quote-derived 3-point sparkline if candles aren't ready yet.
function LiveSparkline({ticker,fetchStockCandles,color,height=34,fallbackData}){
  const [data,setData]=useState(fallbackData||null);
  useEffect(()=>{
    let cancelled=false;
    fetchStockCandles(ticker,'1M').then(d=>{
      if(cancelled) return;
      if(d?.c && Array.isArray(d.c) && d.c.length>2) setData(d.c);
    }).catch(()=>{});
    return()=>{cancelled=true;};
  },[ticker]);
  return <Sparkline data={data} color={color} height={height}/>;
}
function LineChart({data,color='#00d4ff',h=150,dates=null}){
  const [tooltip,setTooltip]=useState(null);
  const svgRef=useRef(null);
  if(!data||data.length<2) return <div style={{height:h,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)',fontSize:'.8rem',flexDirection:'column',gap:8}}><div style={{width:22,height:22,border:'2px solid rgba(0,212,255,.3)',borderTop:'2px solid var(--blue)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>Loading chart…</div>;
  const W=500,min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const px=(i)=>(i/(data.length-1))*W;
  const py=(v)=>h-((v-min)/range)*(h-20)-10;
  const pts=data.map((v,i)=>`${px(i)},${py(v)}`).join(' ');
  const id=`lc${color.replace(/[^a-z0-9]/gi,'')}`;

  const handleMouseMove=(e)=>{
    if(!svgRef.current) return;
    const rect=svgRef.current.getBoundingClientRect();
    const xPct=(e.clientX-rect.left)/rect.width;
    const idx=Math.min(data.length-1,Math.max(0,Math.round(xPct*(data.length-1))));
    const price=data[idx];
    let label='';
    if(dates&&dates[idx]){
      label=dates[idx];
    } else {
      // generate approximate date label from index
      const daysBack=(data.length-1-idx);
      const d=new Date(Date.now()-daysBack*86400000);
      label=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    }
    setTooltip({idx,price,label,x:xPct*100});
  };

  return(
    <div style={{position:'relative',userSelect:'none'}} onMouseLeave={()=>setTooltip(null)}>
      {tooltip&&(
        <div style={{position:'absolute',top:4,left:`clamp(0px,calc(${tooltip.x}% - 60px),calc(100% - 120px))`,
          background:'var(--bg)',border:'1px solid rgba(0,212,255,.3)',borderRadius:8,
          padding:'5px 10px',fontSize:'.74rem',zIndex:10,pointerEvents:'none',
          boxShadow:'0 4px 16px rgba(0,0,0,.5)',minWidth:120}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:color,fontSize:'.84rem'}}>${tooltip.price.toFixed(2)}</div>
          <div style={{color:'var(--t3)',fontSize:'.68rem',marginTop:2}}>{tooltip.label}</div>
        </div>
      )}
      <svg ref={svgRef} viewBox={`0 0 ${W} ${h}`} style={{width:'100%',height:`${h}px`,cursor:'crosshair'}}
        preserveAspectRatio="none" onMouseMove={handleMouseMove}>
        <defs><linearGradient id={id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
        <polygon points={`${pts} ${W},${h} 0,${h}`} fill={`url(#${id})`}/>
        <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
        {tooltip&&(
          <>
            <line x1={px(tooltip.idx)} y1={0} x2={px(tooltip.idx)} y2={h}
              stroke="rgba(255,255,255,.25)" strokeWidth="1" strokeDasharray="3,3"/>
            <circle cx={px(tooltip.idx)} cy={py(tooltip.price)} r="4"
              fill={color} stroke="var(--bg)" strokeWidth="2"/>
          </>
        )}
      </svg>
    </div>
  );
}
function RiskGauge({score}){
  const r=64,cx=80,cy=80;
  const toRad=d=>d*Math.PI/180;
  const angle=Math.min(180,Math.max(0,(score/100)*180));
  const ex=cx-r*Math.cos(toRad(angle));
  const ey=cy-r*Math.sin(toRad(angle));
  const largeArc=angle>180?1:0;
  const color=score<30?'#00e676':score<55?'#ffb700':score<75?'#ff9100':'#ff3d71';
  const label=score<30?'LOW':score<55?'MODERATE':score<75?'HIGH':'VERY HIGH';
  return(
    <svg viewBox="0 0 160 100" style={{width:160,height:100}}>
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="10"/>
      <path d={`M ${cx-r} ${cy} A ${r} ${r} 0 ${largeArc} 1 ${ex} ${ey}`} fill="none" stroke={color} strokeWidth="10" strokeLinecap="round"/>
      <text x={cx} y={cy-8} textAnchor="middle" fill={color} fontSize="22" fontWeight="700" fontFamily="JetBrains Mono,monospace">{score}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill={color} fontSize="9" fontWeight="700" letterSpacing="1">{label} RISK</text>
    </svg>
  );
}

// ─── HOT STOCKS COMPONENT ─────────────────────────────────────────────────────
// Shows top 5 "hot" stocks by combined volume surge + absolute % move.
// Visible to all users on the Dashboard — no auth required.
function HotStocks({ quotes, fetchStockCandles, onSelect }) {
  // Reasons map — contextual "why it's hot" text per ticker
  const WHY = {
    NVDA:  'AI chip demand hits record — Blackwell GPU backlog extends into 2026',
    AAPL:  'Apple Intelligence adoption rate beats internal targets; foldable iPhone leak',
    TSLA:  'FSD v13 hits 1B supervised miles; robotaxi timeline pulled forward to mid-2025',
    AMD:   'MI350 hyperscaler wins at Microsoft Azure and Oracle — NVDA alternative demand',
    META:  'Ad revenue beats consensus; Meta AI Studio sees 340% enterprise growth YoY',
    AMZN:  'AWS growth re-accelerates to 19% YoY on GenAI workload migration wave',
    MSFT:  'Azure market share rises to 24%; Copilot deployed across 50K enterprise clients',
    NFLX:  'Subscriber beat; ad-supported tier now 40% of new sign-ups globally',
    GOOGL: 'Search share holds at 89.9% despite AI Overviews; ad monetisation up 4%',
    JPM:   'Q3 earnings beat; raised dividend 10% — resilient despite NII headwinds',
  };

  // Score each stock: abs(dp)*0.6 + simulated volume surge*0.4
  const scored = useMemo(() => {
    const seeds = { AAPL:0.82, NVDA:0.97, TSLA:0.74, AMD:0.91, META:0.88, AMZN:0.79, MSFT:0.65, NFLX:0.71, GOOGL:0.60, JPM:0.55 };
    return Object.entries(STOCKS_BASE)
      .map(([ticker, info]) => {
        const q = quotes[ticker];
        if (!q?.c) return null;
        const absDp  = Math.abs(q.dp || 0);
        const volSurge = seeds[ticker] || 0.5;          // simulated volume-vs-avg-ratio 0–1
        const hotScore = absDp * 0.55 + volSurge * 50;  // weighted composite
        return { ticker, info, q, absDp, volSurge, hotScore };
      })
      .filter(Boolean)
      .sort((a, b) => b.hotScore - a.hotScore)
      .slice(0, 5);
  }, [quotes]);

  if (!scored.length) return null;
  const maxScore = scored[0].hotScore;

  return (
    <div className="hot-section">
      <div className="hot-header">
        <div className="hot-title">
          <span className="hot-flame">🔥</span>
          Hot Stocks
          <span className="hot-badge">Volume + Momentum</span>
        </div>
        <div style={{ fontSize: '.74rem', color: 'var(--t3)' }}>Updated live · click for full analysis</div>
      </div>
      <div className="hot-grid">
        {scored.map((item, i) => {
          const { ticker, info, q, volSurge, hotScore } = item;
          const up = (q.dp || 0) >= 0;
          return (
            <div key={ticker} className="hot-card" onClick={() => onSelect(ticker)}>

// ─── PRICE TICKER BANNER ─────────────────────────────────────────────────────
function TickerBanner({quotes}){
  const TICKER_SYMS = ['AAPL','NVDA','MSFT','TSLA','AMZN','GOOGL','META','JPM','AMD','NFLX','SPY','QQQ','DIA'];
  const TICKER_NAMES = {
    AAPL:'Apple', NVDA:'NVIDIA', MSFT:'Microsoft', TSLA:'Tesla', AMZN:'Amazon',
    GOOGL:'Alphabet', META:'Meta', JPM:'JPMorgan', AMD:'AMD', NFLX:'Netflix',
    SPY:'S&P 500', QQQ:'NASDAQ', DIA:'Dow Jones'
  };
  const FALLBACK = {
    AAPL:{c:213.49,dp:0.82}, NVDA:{c:875.40,dp:1.34}, MSFT:{c:415.22,dp:0.51},
    TSLA:{c:174.90,dp:-1.20}, AMZN:{c:189.34,dp:0.95}, GOOGL:{c:172.63,dp:0.44},
    META:{c:517.80,dp:1.10}, JPM:{c:198.45,dp:-0.28}, AMD:{c:158.72,dp:2.03},
    NFLX:{c:641.30,dp:0.76}, SPY:{c:534.10,dp:0.61}, QQQ:{c:452.80,dp:0.88},
    DIA:{c:397.50,dp:0.35}
  };
  const items = TICKER_SYMS.map(sym => {
    const q = quotes[sym];
    const price = q?.c || FALLBACK[sym]?.c;
    const dp = q?.dp ?? FALLBACK[sym]?.dp ?? 0;
    return { sym, name: TICKER_NAMES[sym], price, dp };
  }).filter(x => x.price);
  const doubled = [...items, ...items];
  return(
    <div className="ticker-banner" role="marquee" aria-label="Live price ticker">
      <div className="ticker-label">📈 LIVE</div>
      <div className="ticker-track">
        {doubled.map((item, i) => {
          const up = item.dp > 0, dn = item.dp < 0;
          const arrow = up ? '▲' : dn ? '▼' : '●';
          const cls = up ? 'up' : dn ? 'dn' : 'flat';
          return(
            <div key={i} className="ticker-item" title={item.name}>
              <span className="ticker-sym">{item.sym}</span>
              <span className="ticker-price">${fmt(item.price)}</span>
              <span className={`ticker-chg ${cls}`}>{arrow} {Math.abs(item.dp).toFixed(2)}%</span>
              {i < doubled.length - 1 && <span className="ticker-dot"/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── STOCK DETAIL MODAL ─────────────────────────────────────────────────────
function StockModal({ticker,quotes,fetchStockCandles,news,onClose,onTrade}){
  const info=STOCKS_BASE[ticker];
  const q=quotes[ticker]||{};
  const [tf,setTf]=useState('3M');
  const [chartData,setChartData]=useState(null);
  const [chartDates,setChartDates]=useState(null);
  const [dailyCloses,setDailyCloses]=useState(null);
  const [signal,setSignal]=useState(null);
  const [stockNews,setStockNews]=useState([]);
  const [newsLoading,setNewsLoading]=useState(true);
  const [selectedArticle,setSelectedArticle]=useState(null);
  const up=(q.d||0)>=0;

  // Always fetch 1Y daily closes for indicators — industry standard (Fidelity/Bloomberg style):
  // RSI(14), MACD(12,26,9), SMA20/50 are always computed on DAILY closes, never intraday.
  // The chart display changes with timeframe; the indicators do not.
  useEffect(()=>{
    let cancelled=false;
    fetchStockCandles(ticker,'1Y').then(d=>{
      if(cancelled) return;
      if(d?.c && Array.isArray(d.c) && d.c.length>14){
        setDailyCloses(d.c);
      } else {
        const ep=(q.c||0)>0?q.c:(FALLBACK_PRICES[ticker]||100);
        setDailyCloses(genSyntheticCandles(ticker,ep,252));
      }
    }).catch(()=>{
      if(!cancelled){
        const ep=(q.c||0)>0?q.c:(FALLBACK_PRICES[ticker]||100);
        setDailyCloses(genSyntheticCandles(ticker,ep,252));
      }
    });
    return()=>{cancelled=true;};
  },[ticker]);

  // Compute signal from full 1Y daily data whenever it loads
  useEffect(()=>{
    if(!dailyCloses||dailyCloses.length<14) return;
    setSignal(generateSignal(dailyCloses,q.c,q.pc));
  },[dailyCloses,q.c,q.pc]);

  // Fetch chart display data for the selected timeframe
  useEffect(()=>{
    setChartData(null);
    setChartDates(null);
    let cancelled=false;
    fetchStockCandles(ticker,tf).then(d=>{
      if(cancelled) return;
      if(d?.c && Array.isArray(d.c) && d.c.length>1){
        setChartData(d.c);
        // Prefer Finnhub-provided timestamps; fall back to estimated dates
        if(d.t && Array.isArray(d.t) && d.t.length===d.c.length){
          setChartDates(d.t.map(ts=>new Date(ts*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})));
        } else {
          const n=d.c.length;
          const msPerBar=86400000; // always daily now
          const labels=d.c.map((_,i)=>{
            const ts=Date.now()-(n-1-i)*msPerBar;
            return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
          });
          setChartDates(labels);
        }
      } else {
        const dayMap={'1W':5,'1M':21,'3M':63,'6M':126,'1Y':252};
        const days=dayMap[tf]||63;
        if(dailyCloses&&dailyCloses.length>=days){
          setChartData(dailyCloses.slice(-days));
        } else {
          const ep=(q.c||0)>0?q.c:(FALLBACK_PRICES[ticker]||100);
          setChartData(genSyntheticCandles(ticker,ep,days));
        }
      }
    }).catch(()=>{
      if(!cancelled){
        const dayMap={'1W':5,'1M':21,'3M':63,'6M':126,'1Y':252};
        const days=dayMap[tf]||63;
        const ep=(q.c||0)>0?q.c:(FALLBACK_PRICES[ticker]||100);
        setChartData(genSyntheticCandles(ticker,ep,days));
      }
    });
    return()=>{cancelled=true;};
  },[ticker,tf]);

  // Fetch live per-stock news
  useEffect(()=>{
    let cancelled = false;
    setNewsLoading(true);
    fetchStockNews(ticker, news).then(articles => {
      if(cancelled) return;
      setStockNews(articles);
      setNewsLoading(false);
    }).catch(()=>{ if(!cancelled){ setStockNews([]); setNewsLoading(false); }});
    return ()=>{ cancelled=true; };
  },[ticker, news]);

  const rsi=signal?.rsi,macd=signal?.macd,sma20=signal?.sma20,sma50=signal?.sma50;
  const sentiment=useMemo(()=>{
    if(!stockNews.length) return null;
    const processed=stockNews.map(n=>classifySentiment(n.headline||n.title||'',n.summary||''));
    const avg=processed.reduce((s,p)=>s+p.score,0)/processed.length;
    return {score:avg,label:avg>6?'Bullish':avg<4?'Bearish':'Neutral'};
  },[stockNews]);

  return(
    <>
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-wide" style={{maxWidth:660}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div className="ticker-logo" style={{background:info.color,color:'#fff',width:42,height:42,fontSize:'.82rem'}}>{ticker.slice(0,2)}</div>
            <div>
              <div className="modal-title">{ticker}</div>
              <div style={{fontSize:'.78rem',color:'var(--t2)'}}>{info.name} · {info.sector}</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {onTrade&&<><button className="btn-buy" onClick={()=>onTrade('buy',ticker)}>Buy</button><button className="btn-sell" onClick={()=>onTrade('sell',ticker)}>Sell</button></>}
            <button className="close-btn" onClick={onClose}>✕</button>
          </div>
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:8}}>
          <div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'2rem',fontWeight:700,letterSpacing:'-.02em'}}>{fmtPrice(q.c)}</div>
            <div className={`stat-change ${up?'pos':'neg'}`} style={{marginTop:2}}>{up?'▲':'▼'} {fmtPrice(Math.abs(q.d||0))} ({fmtPct(q.dp||0)}) today</div>
          </div>
          <div style={{textAlign:'right'}}>
            {signal&&<><span className={`badge badge-${signal.signal.toLowerCase()}`}>{signal.signal}</span><div style={{fontSize:'.72rem',color:'var(--t3)',marginTop:4}}>Confidence: {signal.conf}%</div></>}
            {sentiment&&<div style={{fontSize:'.72rem',color:sentiment.label==='Bullish'?'var(--green)':sentiment.label==='Bearish'?'var(--red)':'var(--amber)',marginTop:4}}>News: {sentiment.label}</div>}
          </div>
        </div>

        <div className="chart-header" style={{marginBottom:6}}>
          <div style={{fontSize:'.75rem',color:'var(--t3)'}}>Price History {chartData?.length&&`(${chartData.length} pts)`}</div>
          <div className="chart-tabs">
            {['1W','1M','3M','6M','1Y'].map(t=>(
              <button key={t} className={`chart-tab${tf===t?' active':''}`} onClick={()=>setTf(t)}>{t}</button>
            ))}
          </div>
        </div>
        <LineChart data={chartData} color={up?'#00e676':'#ff3d71'} h={140} dates={chartDates}/>

        <div style={{fontWeight:700,fontSize:'.78rem',textTransform:'uppercase',letterSpacing:'.06em',color:'var(--t3)',marginTop:16,marginBottom:6}}>Technical Indicators <span style={{fontWeight:400,fontSize:'.68rem',textTransform:'none',color:'var(--t3)'}}>— computed from daily data (industry standard)</span></div>
        <div className="indicator-grid">
          <div className="indicator-box">
            <div className="ind-label">RSI (14)</div>
            <div className="ind-val" style={{color:rsi==null?'var(--t3)':rsi<30?'var(--green)':rsi>70?'var(--red)':'var(--t1)'}}>{rsi!=null?fmt(rsi,1):'—'}</div>
            {rsi!=null&&<><div className="rsi-bar"><div className="rsi-fill" style={{width:`${rsi}%`,background:rsi<30?'var(--green)':rsi>70?'var(--red)':'var(--blue)'}}/></div><div className="rsi-zones"><span>0</span><span>30</span><span>70</span><span>100</span></div></>}
            <div className="ind-sub" style={{marginTop:4}}>{rsi==null?'Loading…':rsi<30?'🟢 Oversold — potential buy zone':rsi>70?'🔴 Overbought — caution':'🟡 Neutral zone'}</div>
          </div>
          <div className="indicator-box">
            <div className="ind-label">MACD</div>
            <div className="ind-val" style={{color:macd==null?'var(--t3)':macd.histogram>0?'var(--green)':'var(--red)'}}>{macd!=null?fmt(macd.macd,2):'—'}</div>
            {macd!=null&&<div style={{fontSize:'.7rem',color:'var(--t3)',marginTop:4}}>Signal: {fmt(macd.signal,2)} · Hist: {fmt(macd.histogram,2)}</div>}
            <div className="ind-sub" style={{marginTop:4}}>{macd==null?'Loading…':macd.histogram>0?'▲ Bullish momentum':'▼ Bearish momentum'}</div>
          </div>
          <div className="indicator-box">
            <div className="ind-label">SMA 20</div>
            <div className="ind-val" style={{color:sma20==null?'var(--t3)':q.c>sma20?'var(--green)':'var(--red)'}}>{sma20!=null?fmtPrice(sma20):'—'}</div>
            <div className="ind-sub" style={{marginTop:4}}>{sma20==null?'Loading…':q.c>sma20?'Price above 20-day MA':'Price below 20-day MA'}</div>
          </div>
          <div className="indicator-box">
            <div className="ind-label">SMA 50</div>
            <div className="ind-val" style={{color:sma50==null?'var(--t3)':q.c>sma50?'var(--green)':'var(--red)'}}>{sma50!=null?fmtPrice(sma50):'—'}</div>
            <div className="ind-sub" style={{marginTop:4}}>{sma50==null?'Loading…':q.c>sma50?'Price above 50-day MA':'Price below 50-day MA'}</div>
          </div>
        </div>

        {signal&&<div style={{marginTop:12,marginBottom:14}}>

          </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:16}}>
          {[['Open',fmtPrice(q.o)],['Day High',fmtPrice(q.h)],['Day Low',fmtPrice(q.l)],['Prev Close',fmtPrice(q.pc)],['Sector',info.sector],['Beta',fmt(info.beta)]].map(([l,v])=>(

// ─── TRADE MODAL ──────────────────────────────────────────────────────────────
function TradeModal({mode,ticker:initTicker,quotes,holdings,balance,setHoldings,setBalance,onClose}){
  const [ticker,setTicker]=useState(initTicker||'AAPL');
  const [shares,setShares]=useState('');
  const [confirmed,setConfirmed]=useState(false);
  const [error,setError]=useState('');

  const q=quotes[ticker]||{};
  const price=q.c||0;
  const existing=holdings.find(h=>h.ticker===ticker);
  const sharesNum=parseFloat(shares)||0;
  const total=sharesNum*price;
  const maxSell=existing?.shares||0;

  const isBuy=mode==='buy';
  const enoughBalance=isBuy?(balance>=total):true;
  const enoughShares=!isBuy?(sharesNum<=maxSell&&sharesNum>0):true;
  const canConfirm=sharesNum>0&&price>0&&(isBuy?enoughBalance:enoughShares);

  const handleConfirm=()=>{
    if(!canConfirm) return;
    if(isBuy){
      setBalance(b=>b-total);
      setHoldings(prev=>{
        const idx=prev.findIndex(h=>h.ticker===ticker);
        if(idx>=0){
          const h=prev[idx];
          const newShares=h.shares+sharesNum;
          const newAvg=(h.shares*h.avgCost+sharesNum*price)/newShares;
          return prev.map((x,i)=>i===idx?{...x,shares:newShares,avgCost:newAvg}:x);
        }
        return [...prev,{ticker,shares:sharesNum,avgCost:price}];
      });
    } else {
      setBalance(b=>b+total);
      setHoldings(prev=>{
        const idx=prev.findIndex(h=>h.ticker===ticker);
        if(idx<0) return prev;
        const rem=prev[idx].shares-sharesNum;
        if(rem<=0) return prev.filter((_,i)=>i!==idx);
        return prev.map((x,i)=>i===idx?{...x,shares:rem}:x);
      });
    }
    setConfirmed(true);
  };

  if(confirmed) return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:420,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
        <div className="success-circle">{isBuy?'✅':'💰'}</div>
        <div className="modal-title" style={{marginBottom:8}}>{isBuy?'Order Placed!':'Shares Sold!'}</div>
        <p style={{color:'var(--t2)',fontSize:'.88rem',lineHeight:1.65,marginBottom:20}}>
          {isBuy?`You bought ${fmt(sharesNum,4)} shares of ${ticker} at ${fmtPrice(price)} each.`:`You sold ${fmt(sharesNum,4)} shares of ${ticker} at ${fmtPrice(price)} each.`}<br/>
          Total {isBuy?'cost':'proceeds'}: <strong style={{color:'var(--t1)'}}>{fmtPrice(total)}</strong><br/>
          New cash balance: <strong style={{color:'var(--green)'}}>{fmtPrice(balance+(isBuy?-total:total))}</strong>
        </p>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px'}} onClick={onClose}>Done</button>
      </div>
    </div>
  );

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:isBuy?'rgba(0,230,118,.15)':'rgba(255,61,113,.12)',border:`1px solid ${isBuy?'rgba(0,230,118,.3)':'rgba(255,61,113,.3)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem'}}>{isBuy?'📈':'📉'}</div>
            <div className="modal-title">{isBuy?'Buy':'Sell'} {ticker}</div>
          </div>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>

        {!initTicker&&isBuy&&(
          <div className="form-group">
            <label className="form-label">Select Stock</label>
            <select className="form-select" value={ticker} onChange={e=>setTicker(e.target.value)}>
              {Object.keys(STOCKS_BASE).map(t=><option key={t} value={t}>{t} — {STOCKS_BASE[t].name}</option>)}
            </select>
          </div>
        )}

        <div style={{background:'var(--bg3)',borderRadius:10,padding:'12px 14px',marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontWeight:700,fontFamily:"'JetBrains Mono',monospace",fontSize:'1.1rem'}}>{ticker}</div>
              <div style={{fontSize:'.75rem',color:'var(--t3)'}}>{STOCKS_BASE[ticker]?.name}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:'1.2rem'}}>{fmtPrice(price)}</div>
              <div className={`stat-change ${(q.dp||0)>=0?'pos':'neg'}`} style={{fontSize:'.75rem'}}>{fmtPct(q.dp||0)} today</div>
            </div>
          </div>
          {!isBuy&&existing&&(
            <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:'.78rem',color:'var(--t2)'}}>
              <div>Shares owned: <strong style={{color:'var(--t1)'}}>{fmt(existing.shares,4)}</strong></div>
              <div>Avg cost: <strong style={{color:'var(--t1)'}}>{fmtPrice(existing.avgCost)}</strong></div>
              <div>Mkt value: <strong style={{color:'var(--t1)'}}>{fmtPrice(existing.shares*price)}</strong></div>
              <div className={existing.shares*price>existing.shares*existing.avgCost?'pos':'neg'}>
                Unrealized: {fmtPct(((price-existing.avgCost)/existing.avgCost)*100)}
              </div>
            </div>
          )}
        </div>

        <div className="form-group">
          <label className="form-label">Shares {isBuy?'to buy':'to sell'} <span style={{fontWeight:400,color:'var(--t3)'}}>(fractional allowed)</span></label>
          <input className="form-input" type="number" step="0.001" min="0.001" placeholder="e.g. 5 or 0.5"
            value={shares} onChange={e=>{setShares(e.target.value);setError('');}}
            style={{fontFamily:"'JetBrains Mono',monospace"}}/>
          {!isBuy&&<p className="form-hint">Max: {fmt(maxSell,4)} shares available to sell</p>}
        </div>

        {sharesNum>0&&price>0&&(
          <div className="trade-summary">
            <div className="trade-row"><span style={{color:'var(--t2)'}}>{isBuy?'Cost per share':'Sale price per share'}</span><span className="mono">{fmtPrice(price)}</span></div>
            <div className="trade-row"><span style={{color:'var(--t2)'}}>Shares</span><span className="mono">× {fmt(sharesNum,4)}</span></div>
            <div className="trade-row">
              <span>{isBuy?'Total cost':'Total proceeds'}</span>
              <span className="mono" style={{color:isBuy?'var(--red)':'var(--green)'}}>{isBuy?'−':'+'}  {fmtPrice(total)}</span>
            </div>
            <div className="trade-row" style={{paddingTop:8}}>
              <span>Cash after trade</span>
              <span className={`balance-tag${isBuy&&(balance-total)<1000?' low':''}`}>
                {fmtPrice(Math.max(0,isBuy?balance-total:balance+total))}
              </span>
            </div>
          </div>
        )}

        {!isBuy&&sharesNum>maxSell&&sharesNum>0&&<div style={{color:'var(--red)',fontSize:'.82rem',marginBottom:10}}>⚠️ You only own {fmt(maxSell,4)} shares of {ticker}.</div>}
        {isBuy&&sharesNum>0&&!enoughBalance&&<div style={{color:'var(--red)',fontSize:'.82rem',marginBottom:10}}>⚠️ Insufficient funds. Need {fmtPrice(total)}, available {fmtPrice(balance)}.</div>}
        {!isBuy&&!existing&&<div style={{color:'var(--amber)',fontSize:'.82rem',marginBottom:10}}>⚠️ You don't hold any {ticker} shares to sell.</div>}

        <button className={isBuy?'btn btn-primary':'btn btn-sell'}
          style={{width:'100%',justifyContent:'center',padding:'12px',fontSize:'.9rem',opacity:canConfirm?1:.5}}
          onClick={handleConfirm} disabled={!canConfirm}>
          {isBuy?`Buy ${sharesNum>0?fmt(sharesNum,4)+' shares of '+ticker:'Shares'}`:`Sell ${sharesNum>0?fmt(sharesNum,4)+' shares of '+ticker:'Shares'}`}
        </button>

        <div style={{textAlign:'center',marginTop:10}}>
          <span className="balance-tag">Available cash: {fmtPrice(balance)}</span>
        </div>
      </div>
    </div>
  );
}

// ─── PORTFOLIO ────────────────────────────────────────────────────────────────
function Portfolio({quotes,fetchStockCandles,news,holdings,setHoldings,balance,setBalance}){
  const [selected,setSelected]=useState(null);
  const [trade,setTrade]=useState(null); // {mode:'buy'|'sell', ticker:string|null}

  const rows=useMemo(()=>holdings.map((h,i)=>{
    const q=quotes[h.ticker];
    const cur=q?.c||0;
    const val=cur*h.shares;
    const costTotal=h.avgCost*h.shares;
    const gl=val-costTotal; const glPct=costTotal>0?(gl/costTotal)*100:0;
    const dayGl=(q?.d||0)*h.shares;
    return{...h,cur,val,costTotal,gl,glPct,dayGl,color:COLORS_PORT[i%COLORS_PORT.length],q};
  }),[holdings,quotes]);

  const totalVal=rows.reduce((s,r)=>s+r.val,0);
  const totalCost=rows.reduce((s,r)=>s+r.costTotal,0);
  const totalGL=totalVal-totalCost;
  const totalPct=totalCost>0?(totalGL/totalCost)*100:0;
  const totalDayGL=rows.reduce((s,r)=>s+r.dayGl,0);
  const riskScore=useMemo(()=>computeRiskScore(rows),[rows]);
  const riskLabel=riskScore<30?'LOW':riskScore<55?'MODERATE':riskScore<75?'HIGH':'VERY HIGH';
  const riskColor=riskScore<30?'var(--green)':riskScore<55?'var(--amber)':riskScore<75?'#ff9100':'var(--red)';
  const riskRec=riskScore<30?'Well-diversified portfolio with low volatility exposure. Consider maintaining current allocation.'
    :riskScore<55?'Moderate risk level. Beta-weighted exposure is balanced. Slight concentration in tech — consider adding Finance or Healthcare.'
    :riskScore<75?'Elevated risk. High-beta positions (NVDA, TSLA) dominate. Consider trimming concentrated positions or adding defensive stocks.'
    :'Very high risk detected. Concentrated in volatile tech/semi names. Strong recommendation to diversify across sectors and reduce single-position weight.';
  const wBeta=rows.reduce((s,r)=>s+(STOCKS_BASE[r.ticker]?.beta||1)*(r.val/(totalVal||1)),0);

  return(
    <div className="main">
      <div className="page-header">
        <div><div className="page-title">Portfolio</div><div className="page-sub">{holdings.length} positions · Finnhub live prices</div></div>
        <button className="btn btn-primary" onClick={()=>setTrade({mode:'buy',ticker:null})}>📈 Buy Stock</button>
      </div>
      <div className="card-grid-4">
        <div className="card"><div className="stat-label">Total Value</div><div className="stat-val">${totalVal>0?fmt(totalVal,0).replace(/\B(?=(\d{3})+(?!\d))/g,','):'—'}</div><div className="stat-change neu">live market value</div></div>
        <div className="card"><div className="stat-label">Cash Available</div><div className="stat-val pos">${fmt(balance,2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div><div className="stat-change neu">buying power</div></div>
        <div className="card"><div className="stat-label">Total Gain / Loss</div><div className={`stat-val ${totalGL>=0?'pos':'neg'}`}>{totalGL>=0?'+':''}{fmtPrice(Math.abs(totalGL))}</div><div className={`stat-change ${totalGL>=0?'pos':'neg'}`}>{fmtPct(totalPct)} all-time</div></div>
        <div className="card"><div className="stat-label">Day G/L</div><div className={`stat-val ${totalDayGL>=0?'pos':'neg'}`}>{totalDayGL>=0?'+':''}{fmtPrice(Math.abs(totalDayGL))}</div><div className={`stat-change ${totalDayGL>=0?'pos':'neg'}`}>today's move</div></div>
      </div>
      <div className="card-grid-2">
        <div className="card">
          <div style={{fontWeight:700,marginBottom:10}}>Asset Allocation</div>
          <div className="port-alloc">{rows.map(r=><div key={r.ticker} className="port-bar" style={{width:`${totalVal?((r.val/totalVal)*100).toFixed(1):0}%`,background:r.color}}/>)}</div>
          <div className="port-legend">{rows.map(r=><div key={r.ticker} className="leg-item"><div className="leg-dot" style={{background:r.color}}/><span>{r.ticker} {totalVal?((r.val/totalVal)*100).toFixed(1):0}%</span></div>)}</div>
