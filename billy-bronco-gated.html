// ─── WATCHLIST ────────────────────────────────────────────────────────────────
function Watchlist({quotes,watchlist,setWatchlist,fetchStockCandles,news}){
  const [input,setInput]=useState('');
  const [selected,setSelected]=useState(null);
  const add=()=>{const t=input.trim().toUpperCase();if(t&&STOCKS_BASE[t]&&!watchlist.includes(t))setWatchlist([...watchlist,t]);setInput('');};
  const remove=(t)=>setWatchlist(watchlist.filter(x=>x!==t));
  return(
    <div className="main">
      <div className="page-header">
        <div><div className="page-title">Watchlist</div><div className="page-sub">{watchlist.length} stocks · click any row for chart &amp; indicators</div></div>
      </div>
      <div className="wl-input-row">
        <input className="wl-input" placeholder="Enter ticker (AAPL, NVDA, MSFT…)" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
        <button className="btn btn-primary" onClick={add}>+ Add</button>
      </div>
      <div style={{fontSize:'.76rem',color:'var(--t3)',marginBottom:12}}>Available: {Object.keys(STOCKS_BASE).join(', ')}</div>
      <div className="table-wrap">
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 80px 36px',padding:'10px 18px',borderBottom:'1px solid var(--border)',fontSize:'.7rem',fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--t3)'}}>
          <span>Symbol</span><span>Price</span><span>Change</span><span>Signal</span><span>Chart</span><span></span>
        </div>
        {watchlist.map(ticker=>{
          const info=STOCKS_BASE[ticker]; if(!info) return null;
          const q=quotes[ticker]; if(!q) return null;
          const up=(q.dp||0)>=0;
          const sig=(q.dp||0)>2?'BUY':(q.dp||0)<-2?'SELL':'HOLD';
          return(
            <div key={ticker} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 80px 36px',padding:'12px 18px',borderBottom:'1px solid rgba(255,255,255,.03)',alignItems:'center',cursor:'pointer',transition:'background .15s'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(0,212,255,.04)'}
              onMouseLeave={e=>e.currentTarget.style.background=''}
              onClick={()=>setSelected(ticker)}>
              <div className="ticker-cell"><div className="ticker-logo" style={{background:info.color,color:'#fff'}}>{ticker.slice(0,2)}</div><div><div className="ticker-name">{ticker}</div><div className="ticker-full">{info.name}</div></div></div>
              <div className="mono">{fmtPrice(q.c)}</div>
              <div className={`mono ${up?'pos':'neg'}`}>{fmtPct(q.dp||0)}</div>
              <div><span className={`badge badge-${sig.toLowerCase()}`}>{sig}</span></div>
              <LiveSparkline ticker={ticker} fetchStockCandles={fetchStockCandles} color={up?'#00e676':'#ff3d71'} height={34} fallbackData={[q.l||q.c*.99,q.o||q.c,q.h||q.c*1.01,q.c]}/>
              <button className="remove-btn" onClick={e=>{e.stopPropagation();remove(ticker);}}>✕</button>
            </div>
          );
        })}
        {watchlist.length===0&&<div className="empty-state">Add stocks using the input above</div>}
      </div>
      {selected&&<StockModal ticker={selected} quotes={quotes} fetchStockCandles={fetchStockCandles} news={news} onClose={()=>setSelected(null)}/>}
    </div>
  );
}

// ─── ALERTS ───────────────────────────────────────────────────────────────────
function Alerts({quotes,news,holdings,balance,setHoldings,setBalance}){
  const [alerts,setAlerts]=useState([
    {id:1,ticker:'AAPL',type:'price',cond:'above',target:200,status:'active'},
    {id:2,ticker:'NVDA',type:'price',cond:'above',target:900,status:'active'},
    {id:3,ticker:'TSLA',type:'price',cond:'below',target:230,status:'triggered'},
    {id:4,ticker:'META',type:'technical',cond:'RSI > 70 (overbought)',target:null,status:'active'},
    {id:5,ticker:'NFLX',type:'news',cond:'Negative sentiment < 4.0',target:null,status:'inactive'},
    {id:6,ticker:'AMD', type:'technical',cond:'MACD bullish crossover',target:null,status:'active'},
  ]);
  const [showModal,setShowModal]=useState(false);
  const [form,setForm]=useState({ticker:'AAPL',type:'price',cond:'above',target:'',techCond:'RSI > 70 (overbought)',newsCond:'Negative sentiment < 4.0'});
  const [filter,setFilter]=useState('all');
  const [trade,setTrade]=useState(null);

  useEffect(()=>{
    setAlerts(prev=>prev.map(a=>{
      if(a.type!=='price'||a.status==='inactive') return a;
      const cur=quotes[a.ticker]?.c;
      if(!cur) return a;
      const hit=a.cond==='above'?cur>a.target:cur<a.target;
      return{...a,status:hit?'triggered':'active'};
    }));
  },[quotes]);

  const create=()=>{
    const cond=form.type==='price'?form.cond:form.type==='technical'?form.techCond:form.newsCond;
    setAlerts([...alerts,{id:Date.now(),ticker:form.ticker,type:form.type,cond,target:form.target?parseFloat(form.target):null,status:'active'}]);
    setShowModal(false);
    setForm({ticker:'AAPL',type:'price',cond:'above',target:'',techCond:'RSI > 70 (overbought)',newsCond:'Negative sentiment < 4.0'});
  };
  const remove=id=>setAlerts(alerts.filter(a=>a.id!==id));
  const toggle=id=>setAlerts(alerts.map(a=>a.id===id?{...a,status:a.status==='inactive'?'active':'inactive'}:a));
  const filtered=filter==='all'?alerts:alerts.filter(a=>a.type===filter||a.status===filter);

  return(
    <div className="main">
      <div className="page-header">
        <div><div className="page-title">Alerts</div><div className="page-sub">{alerts.filter(a=>a.status==='active').length} active · {alerts.filter(a=>a.status==='triggered').length} triggered · auto-monitored</div></div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Create Alert</button>
      </div>
      <div style={{display:'flex',gap:7,marginBottom:16,flexWrap:'wrap'}}>
        {[['all','All'],['active','Active'],['triggered','Triggered 🔴'],['price','💰 Price'],['technical','📊 Technical'],['news','📰 News']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{padding:'5px 13px',borderRadius:20,border:'1px solid',fontSize:'.78rem',fontWeight:600,cursor:'pointer',background:filter===k?'rgba(0,212,255,.12)':'rgba(255,255,255,.04)',borderColor:filter===k?'var(--blue)':'var(--border)',color:filter===k?'var(--blue)':'var(--t2)',transition:'all .2s'}}>{l}</button>
        ))}
      </div>
      <div className="table-wrap">
        {filtered.map(a=>{
          const cur=quotes[a.ticker]?.c;
          const desc=a.type==='price'?`Price ${a.cond} $${a.target}${cur?` · now ${fmtPrice(cur)}`:''}`:a.cond;
          return(
            <div key={a.id} className="alert-item">
              <div className="alert-left">
                <div className={`alert-dot ${a.status}`}/>
                <div className="alert-info">
                  <div className="alert-name">{a.ticker} · {a.type==='price'?'💰 Price':a.type==='technical'?'📊 Technical':'📰 News'} Alert</div>
                  <div className="alert-desc">{desc}</div>
                </div>
              </div>
              <div className="alert-right">
                <span className={`status-pill status-${a.status}`}>{a.status}</span>
                <button className="btn-trade" onClick={()=>setTrade({mode:'buy',ticker:a.ticker})}>📈 Trade</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>toggle(a.id)}>{a.status==='inactive'?'Enable':'Pause'}</button>
                <button className="btn btn-danger btn-sm" onClick={()=>remove(a.id)}>✕</button>
              </div>
            </div>
          );
        })}
        {filtered.length===0&&<div className="empty-state">No alerts match this filter</div>}
      </div>
      {showModal&&(
        <div className="overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><div className="modal-title">Create Alert</div><button className="close-btn" onClick={()=>setShowModal(false)}>✕</button></div>
            <div className="form-group"><label className="form-label">Stock</label>
              <select className="form-select" value={form.ticker} onChange={e=>setForm({...form,ticker:e.target.value})}>
                {Object.keys(STOCKS_BASE).map(t=><option key={t} value={t}>{t} — {STOCKS_BASE[t].name}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Alert Type</label>
              <select className="form-select" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                <option value="price">💰 Price Alert</option><option value="technical">📊 Technical Indicator</option><option value="news">📰 News Sentiment</option>
              </select>
            </div>
            {form.type==='price'&&<><div className="form-group"><label className="form-label">Condition</label><select className="form-select" value={form.cond} onChange={e=>setForm({...form,cond:e.target.value})}><option value="above">Price goes above</option><option value="below">Price goes below</option></select></div><div className="form-group"><label className="form-label">Target Price ($)</label><input className="form-input" type="number" step="0.01" placeholder="e.g. 200.00" value={form.target} onChange={e=>setForm({...form,target:e.target.value})}/>{quotes[form.ticker]?.c&&<p className="form-hint">Current price: {fmtPrice(quotes[form.ticker].c)}</p>}</div></>}
            {form.type==='technical'&&<div className="form-group"><label className="form-label">Indicator Trigger</label><select className="form-select" value={form.techCond} onChange={e=>setForm({...form,techCond:e.target.value})}><option>RSI &gt; 70 (overbought)</option><option>RSI &lt; 30 (oversold)</option><option>MACD bullish crossover</option><option>MACD bearish crossover</option><option>Price crosses above 50-day MA</option><option>Price crosses below 50-day MA</option></select></div>}
            {form.type==='news'&&<div className="form-group"><label className="form-label">News Condition</label><select className="form-select" value={form.newsCond} onChange={e=>setForm({...form,newsCond:e.target.value})}><option>Negative sentiment &lt; 4.0</option><option>Positive sentiment &gt; 7.0</option><option>Any high-impact news</option><option>Earnings report published</option></select></div>}
            <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px'}} onClick={create}>Create Alert</button>
          </div>
        </div>
      )}
      {trade&&<TradeModal mode={trade.mode} ticker={trade.ticker} quotes={quotes} holdings={holdings} balance={balance} setHoldings={setHoldings} setBalance={setBalance} onClose={()=>setTrade(null)}/>}
    </div>
  );
}

function NewsPage({news}){
  const [filter,setFilter]=useState('all');
  const [selectedArticle,setSelectedArticle]=useState(null);

    const {sentiment,score}=classifySentiment(n.headline||n.title||'',n.summary||'');
    const tickers=(n.related||'').split(',').filter(t=>t&&STOCKS_BASE[t.trim()]).map(t=>t.trim());
    return{...n,sentiment,score,tickers,_idx:idx};
  }),[news]);
  const filtered=filter==='all'?processed:processed.filter(n=>n.sentiment===filter);

  return(
    <div className="main">
      <div className="page-header">
        <div><div className="page-title">News Feed</div><div className="page-sub">Live Finnhub news · keyword sentiment · {processed.length} articles · click any story for full analysis</div></div>
      </div>
      <div style={{display:'flex',gap:7,marginBottom:16,flexWrap:'wrap'}}>
        {[['all','All News'],['bull','▲ Bullish'],['bear','▼ Bearish'],['neu','● Neutral']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{padding:'5px 13px',borderRadius:20,border:'1px solid',fontSize:'.78rem',fontWeight:600,cursor:'pointer',background:filter===k?'rgba(0,212,255,.12)':'rgba(255,255,255,.04)',borderColor:filter===k?'var(--blue)':'var(--border)',color:filter===k?'var(--blue)':'var(--t2)',transition:'all .2s'}}>{l}</button>
        ))}
      </div>
      <div className="table-wrap">
        {filtered.map(n=>(
          <div key={n._idx} className="news-item" onClick={()=>setSelectedArticle(n)}>
            <div className="news-meta">
              <span className="news-source">{n.source}</span>
              <span className="news-time">{timeAgo(n.datetime)}</span>
              <span className={`sent-score ${n.sentiment==='bull'?'sent-bull':n.sentiment==='bear'?'sent-bear':'sent-neu'}`}>
                {n.sentiment==='bull'?'▲ Bullish':n.sentiment==='bear'?'▼ Bearish':'● Neutral'} {fmt(n.score,1)}/10
              </span>
              <span style={{marginLeft:'auto',color:'var(--blue)',fontSize:'.7rem',fontWeight:600}}>Read Analysis ↗</span>
            </div>
            <div className="news-title">{n.headline||n.title}</div>
            <div className="news-tickers" style={{marginTop:6}}>{n.tickers.map(t=><span key={t} className="news-tag">{t}</span>)}</div>
          </div>
        ))}
        {filtered.length===0&&<div className="empty-state">No articles match this filter</div>}
      </div>
      {selectedArticle&&<NewsArticleModal article={selectedArticle} onClose={()=>setSelectedArticle(null)}/>}
    </div>
  );
}

// ─── PAYMENT MODAL ────────────────────────────────────────────────────────────
function PaymentModal({targetPlan,onClose,onComplete}){
  const p=PLANS.find(x=>x.id===targetPlan)||PLANS[2];
  const [step,setStep]=useState(1); // 1=summary 2=payment 3=processing 4=success
  const [form,setForm]=useState({name:'',card:'',expiry:'',cvv:''});
  const [err,setErr]=useState('');

  const formatCard=(v)=>v.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim();
  const formatExp=(v)=>{const d=v.replace(/\D/g,'').slice(0,4);return d.length>2?d.slice(0,2)+'/'+d.slice(2):d;};

  const submitPayment=()=>{
    if(!form.name.trim()){setErr('Please enter the cardholder name.');return;}
    if(form.card.replace(/\s/g,'').length<16){setErr('Please enter a valid 16-digit card number.');return;}
    if(form.expiry.length<5){setErr('Please enter a valid expiry date.');return;}
    if(form.cvv.length<3){setErr('Please enter a valid CVV.');return;}
    setErr('');setStep(3);
    setTimeout(()=>{setStep(4);},2200);
  };

  if(step===4) return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:420,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
        <div className="success-circle">🎉</div>
        <div className="modal-title" style={{marginBottom:8}}>{p.name} Plan Activated!</div>
        <p style={{color:'var(--t2)',fontSize:'.88rem',lineHeight:1.7,marginBottom:20}}>
          Welcome to Billy Bronco <strong style={{color:'var(--blue)'}}>{p.name}</strong>!<br/>
          Your plan has been updated and all features are now unlocked.
        </p>
        <div style={{background:'var(--bg3)',borderRadius:10,padding:'12px 14px',marginBottom:20,textAlign:'left'}}>
          {p.features.map((f,i)=><div key={i} style={{fontSize:'.83rem',color:'var(--t2)',padding:'4px 0',display:'flex',gap:8,alignItems:'center'}}><span style={{color:'var(--green)'}}>✓</span>{f}</div>)}
        </div>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'11px'}} onClick={()=>{onComplete(targetPlan);onClose();}}>Start Using {p.name} →</button>
      </div>
    </div>
  );

  if(step===3) return(
    <div className="overlay">
      <div className="modal" style={{maxWidth:380,textAlign:'center'}}>
        <div style={{fontSize:'2.5rem',marginBottom:16}}>⚙️</div>
        <div className="modal-title" style={{marginBottom:10}}>Processing Payment…</div>
        <p style={{color:'var(--t2)',fontSize:'.85rem',marginBottom:20}}>Please wait while we securely process your payment.</p>
        <div style={{width:'100%',height:4,background:'var(--bg3)',borderRadius:4,overflow:'hidden'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,var(--blue),var(--cyan))',borderRadius:4,animation:'progress-bar 2.2s ease-out forwards'}}/>
        </div>
        <style>{`@keyframes progress-bar{from{width:0%}to{width:100%}}`}</style>
      </div>
    </div>
  );

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:460}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Upgrade to {p.name}</div>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="pay-steps">
          {[1,2].map(s=>(
            <React.Fragment key={s}>
              <div className={`pay-step ${step>s?'done':step===s?'active':'pending'}`}>{step>s?'✓':s}</div>
              {s<2&&<div className="pay-step-line"/>}
            </React.Fragment>
          ))}
          <div style={{marginLeft:8,fontSize:'.78rem',color:'var(--t3)'}}>{step===1?'Order Summary':'Payment Details'}</div>
        </div>

        {step===1&&(
          <>
            <div style={{background:'var(--bg3)',borderRadius:10,padding:'14px 16px',marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:'1rem',color:p.color,marginBottom:4}}>{p.name} Plan</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:'1.6rem',fontWeight:700}}>{p.price===0?'Free':`$${p.price}`}<span style={{fontSize:'.75rem',color:'var(--t3)',fontFamily:"'Archivo',sans-serif",fontWeight:400}}>{p.price>0?'/month':''}</span></div>

            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group"><label className="form-label">Expiry</label><input className="form-input" placeholder="MM/YY" value={form.expiry} onChange={e=>setForm({...form,expiry:formatExp(e.target.value)})} maxLength={5}/></div>
              <div className="form-group"><label className="form-label">CVV</label><input className="form-input" placeholder="123" type="password" value={form.cvv} onChange={e=>setForm({...form,cvv:e.target.value.replace(/\D/g,'').slice(0,4)})} maxLength={4}/></div>
            </div>
            {err&&<div style={{color:'var(--red)',fontSize:'.82rem',marginBottom:10}}>⚠️ {err}</div>}
            <div className="trade-summary">
              <div className="trade-row"><span style={{color:'var(--t2)'}}>Plan</span><span>{p.name}</span></div>
              <div className="trade-row"><span style={{color:'var(--t2)'}}>Billing</span><span>Monthly</span></div>
              <div className="trade-row"><span>Total today</span><span className="mono" style={{color:'var(--blue)',fontWeight:700}}>${p.price.toFixed(2)}</span></div>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1,justifyContent:'center',padding:'11px'}} onClick={()=>setStep(1)}>← Back</button>
              <button className="btn btn-primary" style={{flex:2,justifyContent:'center',padding:'11px'}} onClick={submitPayment}>Pay ${p.price.toFixed(2)} →</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

    formula:'SMA(n)   = (P₁ + P₂ + … + Pₙ) / n\nEMA(n,t) = Price(t) × k + EMA(t-1) × (1 – k)\n           where  k = 2 / (n + 1)',

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [screen,    setScreen]    = useState('landing');
  const [watchlist, setWatchlist] = useState(['AAPL','NVDA','MSFT','TSLA','AMZN']);
  const [user,      setUser]      = useState(null);
  const [showAuth,  setShowAuth]  = useState(false);
  const [plan,      setPlan]      = useState('free');
  // Lifted portfolio state so Alerts can also trade
  const [holdings,  setHoldings]  = useState(PORTFOLIO_HOLDINGS);
  const [balance,   setBalance]   = useState(50000);

  const { quotes, news, mktStatus, loading, lastUpdate, error, wsStatus, fetchStockCandles } = useMarketData();
  const showSidebar = screen !== 'landing';

  return(
    <>
      <Nav screen={screen} setScreen={setScreen} quotes={quotes} mktStatus={mktStatus}
           lastUpdate={lastUpdate} wsStatus={wsStatus} onOpenAuth={()=>setShowAuth(true)} user={user} onSignOut={()=>{setUser(null);setPlan('free');}}/>
      <TickerBanner quotes={quotes}/>
      {error&&<div style={{position:'fixed',top:96,left:0,right:0,zIndex:800,background:'rgba(255,183,0,.12)',borderBottom:'1px solid rgba(255,183,0,.3)',padding:'6px 18px',fontSize:'.78rem',color:'var(--amber)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        ⚠️ {error}
      </div>}
      {showSidebar?(
        <div className="layout" style={{paddingTop: error ? '130px' : '96px'}}>
          <Sidebar screen={screen} setScreen={setScreen} user={user} onSignOut={()=>setUser(null)} onOpenAuth={()=>setShowAuth(true)} plan={plan}/>
          {screen==='dashboard' &&<Dashboard quotes={quotes} fetchStockCandles={fetchStockCandles} watchlist={watchlist} mktStatus={mktStatus} news={news}/>}
          {screen==='portfolio' &&(user ? <Portfolio quotes={quotes} fetchStockCandles={fetchStockCandles} news={news} holdings={holdings} setHoldings={setHoldings} balance={balance} setBalance={setBalance}/> : <AuthGate screen="portfolio" onOpenAuth={()=>setShowAuth(true)}/>)}
          {screen==='watchlist' &&(user ? <Watchlist quotes={quotes} watchlist={watchlist} setWatchlist={setWatchlist} fetchStockCandles={fetchStockCandles} news={news}/> : <AuthGate screen="watchlist" onOpenAuth={()=>setShowAuth(true)}/>)}
          {screen==='alerts'    &&(user ? <Alerts quotes={quotes} news={news} holdings={holdings} balance={balance} setHoldings={setHoldings} setBalance={setBalance}/> : <AuthGate screen="alerts" onOpenAuth={()=>setShowAuth(true)}/>)}
          {screen==='news'      &&<NewsPage news={news}/>}
          {screen==='subscribe' &&<SubscribePage plan={plan} setPlan={setPlan}/>}
          {screen==='learn'     &&<LearnPage/>}
        </div>
      ):<Landing setScreen={setScreen}/>}
      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)} onAuth={(u)=>{setUser(u);setPlan('premium');setShowAuth(false);}}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
