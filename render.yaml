previews:
  generation: manual
  expireAfterDays: 7

services:
  - type: web
    runtime: node
    name: billy-trading-analysis-api
    rootDir: server
    plan: free
    region: oregon
    buildCommand: npm ci
    preDeployCommand: npm run db:setup
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: billy-trading-analysis-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://billy-trading-analysis.onrender.com
      - key: CLIENT_ORIGINS
        value: https://billy-trading-analysis.onrender.com
      - key: FINNHUB_API_KEY
        sync: false
      - key: ENABLE_AI_ANALYSIS
        value: "false"

  - type: web
    runtime: static
    name: billy-trading-analysis
    buildCommand: cd client && npm ci && npm run build
    staticPublishPath: client/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://billy-trading-analysis-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: billy-trading-analysis-db
    databaseName: billy_bronco
    user: billy_bronco
    region: oregon
    plan: basic-256mb
